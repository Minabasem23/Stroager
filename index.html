<!DOCTYPE html>
<html>
<body>

<input id="msg" placeholder="اكتب رسالة">
<button onclick="send()">إرسال</button>

<script>
async function send() {
    const text = document.getElementById("msg").value;

    const response = await fetch(
        "https://api.telegram.org/8781905004:AAEQS0ZBY2I-IE-am7tqDhMBJ-gA1tw6rlY/sendMessage",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                chat_id: "CHAT_ID",
                text: text
            })
        }
    );

    const data = await response.json();

    if (data.ok) {
        alert("تم إرسال الرسالة بنجاح");
    } else {
        alert("فشل الإرسال: " + data.description);
    }
}
</script> 
</body>
</html>
